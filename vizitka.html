<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Александр Михайлов — ИИ-эксперт</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4ff;
      --card-bg: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: #5a6a8a;
      --accent1: #6c63ff;
      --accent2: #3ecfcf;
      --accent3: #a78bfa;
      --shadow: 0 20px 60px rgba(108,99,255,.15);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(108,99,255,.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(62,207,207,.12) 0%, transparent 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 24px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 28px;
      padding: 52px 44px 44px;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp .7s cubic-bezier(.22,.9,.36,1) both;
    }

    /* top decorative strip */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
      border-radius: 28px 28px 0 0;
    }

    /* subtle grid texture */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.03) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      border-radius: inherit;
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }

    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 8px 24px rgba(108,99,255,.35);
      animation: pulse-ring 3s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 8px 24px rgba(108,99,255,.35), 0 0 0 0 rgba(108,99,255,.25); }
      50%      { box-shadow: 0 8px 24px rgba(108,99,255,.35), 0 0 0 14px rgba(108,99,255,.0); }
    }

    /* online badge */
    .badge {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 18px; height: 18px;
      background: #22c55e;
      border: 3px solid #fff;
      border-radius: 50%;
      z-index: 2;
    }

    /* ── Name ── */
    .name {
      font-size: clamp(1.6rem, 5vw, 2rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent1) 0%, #9b5de5 40%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 12px rgba(108,99,255,.3));
      line-height: 1.15;
      margin-bottom: 12px;
      animation: shimmer 4s linear infinite;
      background-size: 200% auto;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* ── Specialization ── */
    .spec {
      font-size: .95rem;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 320px;
      margin: 0 auto 28px;
    }

    .spec strong {
      color: var(--accent1);
      font-weight: 600;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(108,99,255,.2), transparent);
      margin: 0 auto 28px;
    }

    /* ── Tags ── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .tag {
      background: linear-gradient(135deg, rgba(108,99,255,.08), rgba(62,207,207,.08));
      border: 1px solid rgba(108,99,255,.15);
      color: var(--accent1);
      font-size: .78rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 100px;
      letter-spacing: .3px;
      transition: transform .2s, box-shadow .2s;
    }

    .tag:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108,99,255,.2);
    }

    /* ── Social icons ── */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .social-link {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      border-radius: 50%;
      text-decoration: none;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      position: relative;
    }

    .social-link svg { display: block; }

    .social-link::after {
      content: attr(data-label);
      position: absolute;
      bottom: -26px;
      left: 50%; transform: translateX(-50%) scale(.8);
      font-size: .68rem;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
    }

    .social-link:hover { transform: translateY(-6px) scale(1.1); }
    .social-link:hover::after { opacity: 1; transform: translateX(-50%) scale(1); }

    .sl-tg  { background: linear-gradient(135deg,#27a7e5,#1d8fc5); box-shadow: 0 6px 20px rgba(39,167,229,.35); }
    .sl-tg:hover  { box-shadow: 0 10px 28px rgba(39,167,229,.5); }

    .sl-gh  { background: linear-gradient(135deg,#24292e,#444d56); box-shadow: 0 6px 20px rgba(36,41,46,.3); }
    .sl-gh:hover  { box-shadow: 0 10px 28px rgba(36,41,46,.5); }

    .sl-li  { background: linear-gradient(135deg,#0077b5,#005885); box-shadow: 0 6px 20px rgba(0,119,181,.3); }
    .sl-li:hover  { box-shadow: 0 10px 28px rgba(0,119,181,.5); }

    .sl-yt  { background: linear-gradient(135deg,#ff0000,#cc0000); box-shadow: 0 6px 20px rgba(255,0,0,.25); }
    .sl-yt:hover  { box-shadow: 0 10px 28px rgba(255,0,0,.45); }

    /* ── CTA button ── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      background-size: 200% auto;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 700;
      padding: 15px 36px;
      border-radius: 100px;
      box-shadow: 0 8px 24px rgba(108,99,255,.4);
      transition: background-position .4s, transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s;
      letter-spacing: .3px;
      position: relative;
      overflow: hidden;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.15);
      transform: translateX(-100%) skewX(-15deg);
      transition: transform .5s;
    }

    .cta:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 36px rgba(108,99,255,.55); background-position: right center; }
    .cta:hover::before { transform: translateX(120%) skewX(-15deg); }
    .cta:active { transform: translateY(-1px) scale(.99); }

    .cta-icon { flex-shrink: 0; animation: bounce-x 2.5s ease-in-out infinite; }

    @keyframes bounce-x {
      0%,100% { transform: translateX(0); }
      50%      { transform: translateX(4px); }
    }

    /* ── Footer note ── */
    .footer {
      margin-top: 28px;
      font-size: .75rem;
      color: #b0b8cc;
      letter-spacing: .3px;
    }

    /* ── Fade-up entry ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
    }
  </style>
</head>
<body>
